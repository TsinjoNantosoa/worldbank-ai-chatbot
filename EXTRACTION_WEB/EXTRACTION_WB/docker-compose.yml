version: '3.8'

services:
  # Service d'extraction de données
  wb-extraction:
    build:
      context: ..
      dockerfile: EXTRACTION_WB/Dockerfile
    container_name: wb-data-collector
    volumes:
      - ../data:/app/data
      - ../config.json:/app/config.json:ro
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    command: ["python", "-m", "EXTRACTION_WB.collector"]
    restart: "no"  # Run once
    networks:
      - wb-network

  # Service optionnel: collecte planifiée (cron)
  wb-extraction-cron:
    build:
      context: ..
      dockerfile: EXTRACTION_WB/Dockerfile
    container_name: wb-data-collector-cron
    volumes:
      - ../data:/app/data
      - ../config.json:/app/config.json:ro
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    # Utiliser cron pour exécution régulière (exemple: chaque dimanche 2h)
    command: >
      sh -c "
      apt-get update && apt-get install -y cron &&
      echo '0 2 * * 0 cd /app && python -m EXTRACTION_WB.collector >> /var/log/cron.log 2>&1' | crontab - &&
      cron -f
      "
    restart: unless-stopped
    networks:
      - wb-network
    profiles:
      - cron  # Activer avec: docker-compose --profile cron up

networks:
  wb-network:
    driver: bridge
