# Docker Compose - World Bank Chatbot Complete Stack

version: '3.8'

services:
  # Chatbot API (FastAPI + RAG)
  worldbank-chatbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wb-chatbot
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json:ro
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PYTHONUNBUFFERED=1
      - WB_SERVER_HOST=0.0.0.0
      - WB_SERVER_PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - wb-network
    depends_on:
      - wb-extraction

  # Data Extraction (run once ou cron)
  wb-extraction:
    build:
      context: .
      dockerfile: EXTRACTION_WB/Dockerfile
    container_name: wb-collector
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json:ro
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    command: ["python", "-m", "EXTRACTION_WB.collector"]
    restart: "no"  # Run once au démarrage
    networks:
      - wb-network

networks:
  wb-network:
    driver: bridge

volumes:
  wb-data:
    driver: local
